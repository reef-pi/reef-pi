<!doctype html><html><head><meta charset="utf-8"><title>Grid cell & chart panel</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { height: 200px; padding: 16px 20px; gap: 12px; }
  .cell { flex: 1; border: 1px solid #000; border-radius: 10px; padding: 10px 14px; display:flex; flex-direction: column; background: #fff; }
  .cell .hdr { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  svg { width: 100%; height: 100%; flex: 1; }
  .big { font-size: 30px; font-weight: 500; }
  .unit { font-size: 14px; color:#4e5f4e; margin-left: 4px; }
</style>
</head><body>
<div class="card">
  <div class="cell">
    <div class="hdr">Temperature (current)</div>
    <div><span class="big">78.4</span><span class="unit">°F</span></div>
    <div style="font-size:11px; color:#4e5f4e; margin-top: auto;">Display Tank · threshold 76–80</div>
  </div>
  <div class="cell">
    <div class="hdr">pH (historical)</div>
    <svg viewBox="0 0 200 80" preserveAspectRatio="none">
      <polyline fill="none" stroke="#27a822" stroke-width="2" points="0,40 20,42 40,38 60,45 80,36 100,30 120,34 140,28 160,32 180,26 200,30"/>
    </svg>
  </div>
  <div class="cell">
    <div class="hdr">ATO Usage</div>
    <svg viewBox="0 0 200 80" preserveAspectRatio="none">
      <g fill="#1c7e19">
        <rect x="4" y="50" width="18" height="30"/>
        <rect x="28" y="40" width="18" height="40"/>
        <rect x="52" y="30" width="18" height="50"/>
        <rect x="76" y="48" width="18" height="32"/>
        <rect x="100" y="38" width="18" height="42"/>
        <rect x="124" y="20" width="18" height="60"/>
        <rect x="148" y="44" width="18" height="36"/>
        <rect x="172" y="32" width="18" height="48"/>
      </g>
    </svg>
  </div>
</div>
</body></html>
