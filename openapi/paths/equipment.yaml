/api/equipment:
  get:
    operationId: listEquipment
    summary: List all equipment
    tags:
      - Equipment
    responses:
      '200':
        description: List of all equipment successfully retrieved
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/equipment.yaml#/Equipment'
      '401':
        description: Unauthorized - valid session required
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

  put:
    operationId: createEquipment
    summary: Create new equipment
    tags:
      - Equipment
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
              - outlet
            properties:
              name:
                type: string
                description: Name of the equipment
              outlet:
                type: string
                description: Outlet identifier
              stay_off_on_boot:
                type: boolean
                description: If true, equipment will not be powered on during boot
              boot_delay:
                type: integer
                description: Seconds to wait before powering on during boot
    responses:
      '200':
        description: Equipment created successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/equipment.yaml#/Equipment'
      '400':
        description: Bad request - invalid input
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized - valid session required
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

/api/equipment/{id}:
  get:
    operationId: getEquipment
    summary: Get equipment by ID
    tags:
      - Equipment
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Equipment ID
    responses:
      '200':
        description: Equipment found
        content:
          application/json:
            schema:
              $ref: '../schemas/equipment.yaml#/Equipment'
      '401':
        description: Unauthorized - valid session required
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Equipment not found
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

  post:
    operationId: updateEquipment
    summary: Update equipment
    tags:
      - Equipment
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Equipment ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: Name of the equipment
              outlet:
                type: string
                description: Outlet identifier
              stay_off_on_boot:
                type: boolean
                description: If true, equipment will not be powered on during boot
              boot_delay:
                type: integer
                description: Seconds to wait before powering on during boot
    responses:
      '200':
        description: Equipment updated successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/equipment.yaml#/Equipment'
      '400':
        description: Bad request - invalid input
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized - valid session required
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Equipment not found
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

  delete:
    operationId: deleteEquipment
    summary: Delete equipment
    tags:
      - Equipment
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Equipment ID
    responses:
      '200':
        description: Equipment deleted successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized - valid session required
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Equipment not found
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

/api/equipment/{id}/control:
  post:
    operationId: controlEquipment
    summary: Control equipment power state
    tags:
      - Equipment
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Equipment ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/equipment.yaml#/EquipmentAction'
    responses:
      '200':
        description: Equipment state changed successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/equipment.yaml#/Equipment'
      '400':
        description: Bad request - invalid input
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized - valid session required
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Equipment not found
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
