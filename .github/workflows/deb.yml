name: Debian Package
on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'jsx/**'
      - '*.json'
      - 'yarn.lock'
      - 'Makefile'
      - 'build/**'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'jsx/**'
      - '*.json'
      - 'yarn.lock'
      - 'Makefile'
      - 'build/**'

jobs:
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'
      - name: Install
        run: yarn
      - name: Build UI
        run: make ui
      - name: Generate API doc
        run: make api-doc
      - name: Upload UI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ui-dist
          path: ui/
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build Package (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: build-ui
    strategy:
      matrix:
        target:
          - x86
          - pi0
          - pi3
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
      - name: Download UI artifact
        uses: actions/download-artifact@v8
        with:
          name: ui-dist
          path: ui/
      - name: x86
        if: matrix.target == 'x86'
        run: make x86
      - name: pi-zero
        if: matrix.target == 'pi0'
        run: make pi-zero
      - name: pi
        if: matrix.target == 'pi3'
        run: make pi
      - name: bundler
        run: gem install bundler -v 2.4 --no-document
      - name: fpm
        run: bundle install
      - name: pi_deb
        if: matrix.target != 'x86'
        run: make pi_deb_prebuilt
      - name: x86_deb
        if: matrix.target == 'x86'
        run: make x86_deb_prebuilt
      - name: Rename deb package
        run: |
          VERSION=$(git describe --always --tags)
          mv reef-pi-${VERSION}.deb reef-pi-${VERSION}-${{ matrix.target }}.deb
      - name: "Upload ${{ matrix.target }} deb package"

        uses: actions/upload-artifact@v7

        uses: actions/upload-artifact@v7

        with:
          name: ${{ matrix.target }}-debian-package
          path: 'reef-pi-*.deb'
          if-no-files-found: error
          retention-days: 30
